# MariaDB configuration
quarkus.datasource.db-kind=mariadb
quarkus.datasource.username=root
quarkus.datasource.password=root
quarkus.datasource.jdbc.url=jdbc:mariadb://localhost:3306/quarkus

# Enable Hibernate ORM to create/update the schema
quarkus.hibernate-orm.database.generation=drop-and-create

# Optional: Show SQL statements in the logs
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.log.format-sql=false

# Hibernate configuration
# quarkus.hibernate-orm.database.generation=none

# Flyway configuration
# quarkus.flyway.migrate-at-start=true
# quarkus.flyway.baseline-on-migrate=true
# quarkus.flyway.locations=filesystem:db/migration

quarkus.log.category."io.quarkus.devservices".level=DEBUG

quarkus.log.console.json=false
